services:
  - type: web
    name: ai-sql-agent-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: SQL_MAX_ROWS
        value: "500"
      - key: SQL_TIMEOUT_SECONDS
        value: "15"
      - key: LLM_PROVIDER
        value: google
      - key: LLM_MODEL
        value: gemini-2.0-flash
      - key: LLM_TEMPERATURE
        value: "0.2"
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: SECRET_KEY
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_PORT
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_DB
        sync: false
      - key: CORS_ORIGINS
        sync: false
